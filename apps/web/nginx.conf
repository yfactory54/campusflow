server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;

  # API 프록시: 같은 도메인의 /api/ 요청을 api 컨테이너로 전달.
  # (api 서비스는 compose 네트워크에서 호스트명 `api` 로 접근, 내부 포트 4000)
  location /api/ {
    proxy_pass http://api:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # AI 기여도 분석 등 긴 응답을 위해 타임아웃 여유.
    proxy_read_timeout 120s;
  }

  # SPA 라우팅: 정적 파일이 없으면 index.html 로 폴백
  location / {
    try_files $uri $uri/ /index.html;
  }
}
