services:
  api:
    build: ./apps/api
    container_name: campusflow-api
    # 호스트 포트는 API_PORT, 컨테이너 내부 포트는 PORT(기본 4000).
    ports:
      - "${API_PORT:-4000}:${PORT:-4000}"
    # 모든 값을 ${VAR:-기본값} 으로 노출 → Coolify 등에서 관리형 변수로 인식.
    environment:
      PORT: "${PORT:-4000}"
      DB_PATH: "${DB_PATH:-/app/data/app.db}"
      # 운영 시 강력한 무작위 값으로 교체하세요.
      TOKEN_SECRET: "${TOKEN_SECRET:-change-me-in-production}"
      TOKEN_TTL_SECONDS: "${TOKEN_TTL_SECONDS:-604800}"
      # 최초 시드 관리자 계정. ADMIN_PASSWORD 미설정 시 무작위 생성되어
      # `docker compose logs api` 로 확인할 수 있습니다.
      ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@example.com}"
      ADMIN_NAME: "${ADMIN_NAME:-관리자}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      # 프론트가 호출할 API 공개 주소(Coolify 등 도메인 배포 시 설정). 기여도 분석 LLM 설정도 여기에.
      LLM_BASE_URL: "${LLM_BASE_URL:-http://localhost:8000/v1}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      LLM_TIMEOUT_MS: "${LLM_TIMEOUT_MS:-90000}"
    volumes:
      - api-data:/app/data
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        # 기본은 같은 도메인 상대경로 /api/ (web nginx 가 api 로 프록시) → 도메인 설정 불필요.
        # 별도 API 도메인을 쓸 때만 VITE_API_BASE 에 절대 URL 을 지정하세요. 예) https://api.example.com/api/
        VITE_API_BASE: ${VITE_API_BASE:-}
    container_name: campusflow-web
    # 호스트 포트는 WEB_PORT(기본 5173), 컨테이너 내부는 nginx 80.
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  api-data:
